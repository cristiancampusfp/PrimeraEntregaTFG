<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - FitnessApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card-registro { max-width: 600px; margin: 50px auto; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="card card-registro p-4">
        <h2 class="text-center mb-4">Crea tu cuenta</h2>

        <div id="alerta" class="alert d-none" role="alert"></div>

        <form id="registroForm">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nombre completo</label>
                    <input type="text" class="form-control" id="nombre" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" required>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Edad</label>
                    <input type="number" class="form-control" id="edad" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Peso (kg)</label>
                    <input type="number" step="0.1" class="form-control" id="peso" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Altura (m)</label>
                    <input type="number" step="0.01" class="form-control" id="altura" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Objetivo</label>
                    <select class="form-select" id="objetivo">
                        <option value="perder_peso">Perder peso</option>
                        <option value="mantener">Mantener</option>
                        <option value="ganar_musculo">Ganar músculo</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nivel de Experiencia</label>
                    <select class="form-select" id="nivelExperiencia">
                        <option value="principiante">Principiante</option>
                        <option value="intermedio">Intermedio</option>
                        <option value="avanzado">Avanzado</option>
                    </select>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Días disponibles para entrenar (a la semana)</label>
                <input type="number" class="form-control" id="diasDisponibles" min="1" max="7" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">Registrarse</button>
            <div class="text-center">
                <a href="/login" class="text-decoration-none">¿Ya tienes cuenta? Inicia sesión aquí</a>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('registroForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Evita que la página recargue

        // Recogemos los datos del formulario
        const datos = {
            nombre: document.getElementById('nombre').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            edad: parseInt(document.getElementById('edad').value),
            peso: parseFloat(document.getElementById('peso').value),
            altura: parseFloat(document.getElementById('altura').value),
            objetivo: document.getElementById('objetivo').value,
            nivelExperiencia: document.getElementById('nivelExperiencia').value,
            diasDisponibles: parseInt(document.getElementById('diasDisponibles').value)
        };

        const alerta = document.getElementById('alerta');

        // Enviamos los datos al Backend (Spring Boot)
        fetch('/api/auth/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(datos)
        })
        .then(response => {
            if (response.ok) {
                alerta.className = 'alert alert-success';
                alerta.textContent = '¡Registro completado! Redirigiendo...';
                alerta.classList.remove('d-none');
                setTimeout(() => window.location.href = '/login', 2000); // Redirige al login en 2s
            } else {
                return response.text().then(text => { throw new Error(text) });
            }
        })
        .catch(error => {
            alerta.className = 'alert alert-danger';
            alerta.textContent = error.message || 'Error al registrar el usuario';
            alerta.classList.remove('d-none');
        });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
