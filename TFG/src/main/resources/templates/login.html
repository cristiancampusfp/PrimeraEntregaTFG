<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - FitnessApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card-login { width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card card-login p-4">
        <h2 class="text-center mb-4">Iniciar Sesión</h2>

        <div id="alerta" class="alert d-none" role="alert"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">Entrar</button>
            <div class="text-center">
                <a href="/register" class="text-decoration-none">¿No tienes cuenta? Regístrate</a>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const datos = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        const alerta = document.getElementById('alerta');

        fetch('/api/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(datos)
        })
        .then(response => {
            if (response.ok) {
                return response.json(); // Ahora esperamos un JSON con el token y el usuario
            } else {
                return response.text().then(text => { throw new Error(text) });
            }
        })
        .then(data => {
            // Guardamos el token en el navegador para futuras peticiones
            localStorage.setItem('jwtToken', data.token);
            localStorage.setItem('usuarioDatos', JSON.stringify(data.usuario));

            alerta.className = 'alert alert-success';
            alerta.textContent = '¡Bienvenido ' + data.usuario.nombre + '!';
            alerta.classList.remove('d-none');

            // Redirigir según el rol
            setTimeout(() => {
                if (data.usuario.rol === 'ADMIN') {
                    window.location.href = '/dashboard-admin';
                } else {
                    window.location.href = '/dashboard-cliente';
                }
            }, 1500);
        })
        .catch(error => {
            alerta.className = 'alert alert-danger';
            alerta.textContent = error.message || 'Credenciales incorrectas';
            alerta.classList.remove('d-none');
        });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
